# Jekyll + Just the Docs — deployed via GitHub Actions (.github/workflows/jekyll-pages.yml).
# In the repo: Settings → Pages → Build and deployment → Source: GitHub Actions (not “branch”).
# Site URL: https://ManStevoh.github.io/<exact-repo-name>/ — baseurl below must match that repo name.

title: Waste Bridge Docs
description: Technical Documentation for Waste Bridge Platform

remote_theme: just-the-docs/just-the-docs

# Helps jekyll-github-metadata (used by github-pages build) resolve project name → base path
repository: ManStevoh/WASTE_BRIDGE

url: https://ManStevoh.github.io
baseurl: "/WASTE_BRIDGE"

permalink: pretty

color_scheme: dark

search_enabled: true

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag

# Legacy markdown in this folder — keep as repo reference only; not published as site pages
exclude:
  - FLUTTER_AND_BACKEND_INVENTORY.md
  - IMPLEMENTATION_STATUS.md
  - API_DOCUMENTATION.md
  - PHASE4_PAYMENTS.md
  - SCREENS_REFACTOR_GUIDE.md
  - UI_GUIDE.md
  - ARCHITECTURE_REFACTOR_GUIDE.md
  - PEAK_LOAD.md
  - PROGRAM_SETUP.md
  - RISK_REGISTER.md
  - BUSINESS_MODEL.md
  - BACKEND_MODULES.md
  - DATABASE_DOCUMENTATION.md
  - DATABASE.md
