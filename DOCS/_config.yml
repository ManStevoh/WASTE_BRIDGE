# Jekyll + Just the Docs — GitHub Pages (use folder /DOCS in repo Settings → Pages)

title: Waste Bridge Docs
description: Technical Documentation for Waste Bridge Platform

remote_theme: just-the-docs/just-the-docs

url: https://ManStevoh.github.io
baseurl: "/WASTE_BRIDGE"

permalink: pretty

color_scheme: dark

search_enabled: true

plugins:
