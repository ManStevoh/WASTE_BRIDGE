# Minimal stack: API + SQLite (override with MySQL in production).
services:
  api:
    build: .
    ports:
      - "8000:8000"
    working_dir: /app
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
    volumes:
      - ./backend:/app
    command: >
      sh -c "touch database/database.sqlite && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
